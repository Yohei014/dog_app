<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<title>犬種判定AI</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>🐶 犬種判定AI</h1>

<form method="POST" enctype="multipart/form-data" onsubmit="showLoading()">

<div class="upload-box" id="drop-area">

<p>画像をドラッグ＆ドロップ<br>またはクリックして選択</p>

<input type="file" name="file" id="file-input" accept="image/*">

</div>

<div id="preview-area"></div>

<button type="submit" class="btn">判定する</button>

</form>

<div id="loading" class="loading">
AI解析中...
</div>


{% if image %}

<h2>Grad-CAM（AIが見ている場所）</h2>

<div class="slider-container">

<img src="{{image}}" class="image-base">

<img src="{{gradcam}}" class="image-overlay" id="gradcam">

<input type="range" min="0" max="100" value="50" class="slider" id="cam-slider">

</div>


<h2>判定結果</h2>

<div class="result-box">

{% for r in results %}

<div class="result-item">

<div class="label">{{r[0]}}</div>

<div class="bar-container">

<div class="bar" style="width: {{r[1]}}%"></div>

</div>

<div class="percent">{{r[1]}}%</div>

</div>

{% endfor %}

</div>

{% endif %}

</div>


<script>

const dropArea = document.getElementById("drop-area");
const fileInput = document.getElementById("file-input");
const previewArea = document.getElementById("preview-area");

// クリック
dropArea.addEventListener("click",()=>fileInput.click());

// ドラッグ
dropArea.addEventListener("dragover",(e)=>{
e.preventDefault();
dropArea.classList.add("drag");
});

dropArea.addEventListener("dragleave",()=>{
dropArea.classList.remove("drag");
});

dropArea.addEventListener("drop",(e)=>{

e.preventDefault();
dropArea.classList.remove("drag");

const file = e.dataTransfer.files[0];

fileInput.files = e.dataTransfer.files;

showPreview(file);

});

// ファイル選択
fileInput.addEventListener("change",()=>{

const file=fileInput.files[0];

showPreview(file);

});

// プレビュー
function showPreview(file){

const reader=new FileReader();

reader.onload=function(e){

previewArea.innerHTML=`

<p>選択された画像</p>

<img src="${e.target.result}" class="preview-img">

<p>${file.name}</p>

`;

}

reader.readAsDataURL(file);

}

// ローディング
function showLoading(){

document.getElementById("loading").style.display="block";

}

// GradCAMスライダー
const slider=document.getElementById("cam-slider");

if(slider){

slider.addEventListener("input",function(){

document.getElementById("gradcam").style.opacity=(this.value/100);

});

}

</script>

</body>
</html>
