<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Dog Breed Classifier</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='stylesheet.css') }}">
</head>
<body>
    <header>
        <a class="header-logo" href="#">Dog Breed Classifier</a>
    </header>

    <div class="main">
        <h2>AIが犬種を識別します</h2>
        <p>画像をドロップするか、枠内をクリックして選択してください</p>

        <form method="POST" action="/" enctype="multipart/form-data" onsubmit="showLoading()">
            <div id="drop-area">
                <p id="drop-text">ここに画像をドロップ</p>
                <div id="preview-area"></div>
                <input type="file" name="file" id="file-input" accept="image/*" style="display: none;">
            </div>
            
            <input class="btn" value="識別を開始する" type="submit">
        </form>

        <div id="loading" style="display:none; margin: 20px; color: #555;">
            <div class="spinner"></div>
            <p>AIが一生懸命考えています...</p>
        </div>

        {% if results %}
        <div class="result-area">
            <h3>識別結果</h3>
            <img src="{{ image }}" class="result-img">
            <ul>
            {% for breed, prob in results %}
                <li><strong>{{ breed }}</strong>: {{ prob }}%</li>
            {% endfor %}
            </ul>
        </div>
        {% endif %}
    </div>

    <footer>
        <small>&copy; 2026 Dog Classifier</small>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
