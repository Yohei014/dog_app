<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Breed Classifier</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='stylesheet.css') }}">
</head>
<body>
    <header>
        <div class="container">
            <a class="header-logo" href="/">Dog Classifier</a>
        </div>
    </header>

    <div class="main">
        <div class="container">
            <h2>AI犬種識別</h2>
            <p class="subtitle">120種類の犬種を瞬時に見分けます</p>

            <form method="POST" action="/" enctype="multipart/form-data" onsubmit="showLoading()">
                <div id="drop-area">
                    <div id="preview-area">
                        <div class="upload-icon">📸</div>
                        <p>画像をドロップするか、クリックして選択</p>
                    </div>
                    <input type="file" name="file" id="file-input" accept="image/*" style="display: none;">
                </div>
                <input class="btn" value="識別を開始する" type="submit">
            </form>

            <div id="loading" style="display:none;">
                <div class="spinner"></div>
                <p>解析中...</p>
            </div>

            {% if results %}
            <div class="result-area animate-fade-in">
                <h3>識別結果</h3>
                <img src="{{ image }}" class="result-img">
                <ul class="result-list">
                {% for breed, prob in results %}
                    <li>
                        <span class="breed-name">{{ breed }}</span>
                        <div class="prob-bar-container">
                            <div class="prob-bar" style="width: {{ prob }}%;"></div>
                        </div>
                        <span class="prob-value">{{ prob }}%</span>
                    </li>
                {% endfor %}
                </ul>
            </div>
            {% endif %}
        </div>
    </div>

    <footer>
        <small>&copy; 2026 Dog Classifier</small>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
